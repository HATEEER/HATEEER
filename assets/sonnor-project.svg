    <rect x="700" y="84" width="190" height="68" rx="6" fill="#0e141c" stroke="#334252"/>
    <text x="720" y="111" fill="#f0f4f8" font-size="15" font-weight="700">MOBILE CLIENT</text>
    <text x="720" y="135" fill="#8795a4" font-size="13">Expo / React Native</text>
